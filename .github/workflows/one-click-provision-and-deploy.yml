name: One Click Provision And Deploy

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region"
        required: true
        default: "ap-southeast-2"
      instance_type:
        description: "EC2 instance type"
        required: true
        default: "t3.micro"
      app_branch:
        description: "Git branch to deploy"
        required: true
        default: "main"
      ssh_ingress_cidr:
        description: "SSH CIDR"
        required: true
        default: "0.0.0.0/0"
      http_ingress_cidr:
        description: "HTTP CIDR"
        required: true
        default: "0.0.0.0/0"
  push:
    branches:
      - main

jobs:
  provision-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      # FIXES THE NODE.JS 20 WARNING
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TF_IN_AUTOMATION: true
      APP_DIR: /opt/mock-aus-gov-portal
      APP_USER: ubuntu
      # FALLBACKS: Uses inputs if manual, or defaults if it's a push
      AWS_REGION: ${{ github.event.inputs.aws_region || 'ap-southeast-2' }}
      INSTANCE_TYPE: ${{ github.event.inputs.instance_type || 't3.micro' }}
      SSH_CIDR: ${{ github.event.inputs.ssh_ingress_cidr || '0.0.0.0/0' }}
      HTTP_CIDR: ${{ github.event.inputs.http_ingress_cidr || '0.0.0.0/0' }}
      BRANCH: ${{ github.event.inputs.app_branch || 'main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform apply
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="instance_type=${{ env.INSTANCE_TYPE }}" \
            -var="project_name=mock-gov-portal" \
            -var="ec2_public_key=${{ secrets.EC2_PUBLIC_KEY }}" \
            -var="ssh_ingress_cidr=${{ env.SSH_CIDR }}" \
            -var="http_ingress_cidr=${{ env.HTTP_CIDR }}"

      # ... (remaining steps as before, but using ${{ env.BRANCH }} where needed)
