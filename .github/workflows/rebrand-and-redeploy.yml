name: 🏢 Rebrand And Redeploy Existing EC2

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: 'AWS Region'
        required: true
        default: 'ap-southeast-2'
      department_name:
        description: 'Full Department Name'
        required: true
        default: 'Department of the Prime Minister and Cabinet'
      department_short_name:
        description: 'Short Name / Initials'
        required: false

jobs:
  rebrand:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Retrieve EC2 IP Address
        id: get-ip
        run: |
          echo "Fetching running EC2 instance IP address..."
          IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=mock-gov-portal-instance" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          
          if [ "$IP" == "None" ] || [ -z "$IP" ]; then
            echo "Error: Could not find a running EC2 instance."
            exit 1
          fi
          echo "ec2_ip=$IP" >> $GITHUB_OUTPUT

      - name: SSH, Rebrand and Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.get-ip.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="/opt/mock-aus-gov-portal"
            
            # Navigate to the app directory
            cd $APP_DIR
            
            # Export environment variables for the rebrand script
            export DEPT_NAME="${{ github.event.inputs.department_name }}"
            export SHORT_NAME="${{ github.event.inputs.department_short_name }}"
            
            # Run the rebrand script
            node scripts/rebrand.js
            
            # Restart the service
            sudo systemctl restart gov-portal
            echo "App successfully rebranded and restarted!"
