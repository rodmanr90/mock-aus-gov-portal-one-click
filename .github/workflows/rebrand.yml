name: Rebrand & Tailor Portal

on:
  workflow_dispatch:
    inputs:
      dept_name:
        description: 'Full Department Name'
        required: true
        default: 'Department of Defence'
      short_name:
        description: 'Short Name (Initials)'
        required: true
        default: 'Defence'
      risk_styling:
        description: 'Mock Security Posture'
        required: true
        type: choice
        options:
          - low
          - medium
          - high
        default: 'low'

jobs:
  rebrand:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Run Rebrand Script
        run: node scripts/rebrand.js "${{ github.event.inputs.dept_name }}" "${{ github.event.inputs.short_name }}" "${{ github.event.inputs.risk_styling }}"
        
      - name: Commit Branding Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Rebranded to ${{ github.event.inputs.dept_name }} [${{ github.event.inputs.risk_styling }}]"
          file_pattern: 'public/branding.json'
