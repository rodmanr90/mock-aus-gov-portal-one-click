name: 🔄 Revert Attack & Restore App

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: 'AWS Region where the portal is deployed'
        required: true
        default: 'ap-southeast-2'

jobs:
  revert-attack:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Retrieve EC2 IP Address
        id: get-ip
        run: |
          echo "Fetching running EC2 instance IP address..."
          IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=mock-gov-portal-instance" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          
          if [ "$IP" == "None" ] || [ -z "$IP" ]; then
            echo "Error: Could not find a running EC2 instance with the tag Name=mock-gov-portal-instance."
            exit 1
          fi
          
          echo "Found IP: $IP"
          echo "ec2_ip=$IP" >> $GITHUB_OUTPUT

      - name: SSH and Restore
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.get-ip.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="/opt/mock-aus-gov-portal"
            
            echo "==== 1. RESTORING APP FILES ===="
            # Switch back to the un-hacked version from git
            cd $APP_DIR
            sudo git restore public/index.html
            
            echo "==== 2. CLEANING UP SIMULATED THREATS ===="
            # Kill the simulated process if it's still running
            sudo pkill -f /tmp/kworker || true
            sudo rm -f /tmp/kworker
            sudo rm -f /tmp/simulated-threats.sh
            sudo rm -f /tmp/simulated-threats.log
            
            # Remove the simulated host file entry
            sudo sed -i '/# Simulated unauthorized access marker/d' /etc/hosts.allow
            
            echo "==== 3. RESTARTING APP ===="
            sudo systemctl restart gov-portal
            
            echo "Application successfully restored."
