name: 🚨 Simulate Attack & Defacement

on:
  workflow_dispatch:
    inputs:
      attacker_name:
        description: 'Attacker Name for Defacement Banner'
        required: true
        default: 'Anonymous'
      aws_region:
        description: 'AWS Region where the portal is deployed'
        required: true
        default: 'ap-southeast-2'

jobs:
  simulate-attack:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Retrieve EC2 IP Address
        id: get-ip
        run: |
          echo "Fetching running EC2 instance IP address..."
          IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=mock-gov-portal-instance" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          
          if [ "$IP" == "None" ] || [ -z "$IP" ]; then
            echo "Error: Could not find a running EC2 instance with the tag Name=mock-gov-portal-instance."
            exit 1
          fi
          
          echo "Found IP: $IP"
          echo "ec2_ip=$IP" >> $GITHUB_OUTPUT

      - name: SSH and Deface
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.get-ip.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="/opt/mock-aus-gov-portal"
            
            echo "==== 1. DEFACING WEBSITE ===="
            # Injecting the banner directly into the HTML
            sudo sed -i "s|<body>|<body><div id='hacked-banner' style='background: red; color: white; text-align: center; padding: 20px; font-size: 30px; font-family: monospace; font-weight: bold; position: fixed; top: 0; width: 100%; z-index: 9999; animation: blink 1s infinite;'>PwNeD by ${{ github.event.inputs.attacker_name }}</div><style>@keyframes blink { 50% { opacity: 0.5; } }</style>|g" $APP_DIR/public/index.html
            
            echo "==== 2. SIMULATING TELEMETRY FOR WIZ ===="
            
            # Start a background script that generates safe, simulated threat telemetry
            cat << 'SCRIPT' > /tmp/simulated-threats.sh
            #!/bin/bash
            
            # Simulating an unauthorized Port Scan (Localhost only for safety)
            echo "Simulating port scan..."
            sudo apt-get update && sudo apt-get install nmap -y
            nmap -sS -p 1-1024 localhost > /dev/null 2>&1
            
            # Simulating Crypto-mining DNS resolution (safe queries to trigger Threat Intel)
            echo "Simulating crypto-miner DNS lookup..."
            dig +short pool.supportxmr.com > /dev/null 2>&1
            dig +short xmr.crypto-pool.fr > /dev/null 2>&1
            
            # Simulating IMDSv1 Meta-data scraping (Cloud reconnaissance)
            echo "Simulating IMDS scraping..."
            curl -s http://169.254.169.254/latest/meta-data/iam/security-credentials/ > /dev/null 2>&1
            
            # Simulating Suspicious Execution (Kworker masquerade)
            echo "Simulating suspicious process execution..."
            cp /bin/bash /tmp/kworker
            /tmp/kworker -c 'sleep 5' &
            
            # Simulating Privilege Escalation Indicators (Modifying sensitive file safely)
            echo "Simulating PrivEsc indicator..."
            sudo bash -c 'echo "# Simulated unauthorized access marker" >> /etc/hosts.allow'

            echo "Threat simulation completed."
            SCRIPT
            
            chmod +x /tmp/simulated-threats.sh
            # Run in background so the workflow completes
            nohup /tmp/simulated-threats.sh > /tmp/simulated-threats.log 2>&1 &
