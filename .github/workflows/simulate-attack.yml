name: 🚨 Simulate Attack & Defacement

on:
  workflow_dispatch:
    inputs:
      attacker_name:
        description: 'Attacker Name for Defacement Banner'
        required: true
        default: 'Anonymous'
      aws_region:
        description: 'AWS Region where the portal is deployed'
        required: true
        default: 'ap-southeast-2'

jobs:
  simulate-attack:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Retrieve EC2 IP Address
        id: get-ip
        run: |
          echo "Fetching running EC2 instance IP address..."
          IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=mock-gov-portal-instance" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          
          if [ "$IP" == "None" ] || [ -z "$IP" ]; then
            echo "Error: Could not find a running EC2 instance with the tag Name=mock-gov-portal-instance."
            exit 1
          fi
          
          echo "Found IP: $IP"
          echo "ec2_ip=$IP" >> $GITHUB_OUTPUT

      - name: SSH and Deface
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.get-ip.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="/opt/mock-aus-gov-portal"
            
            echo "==== 1. DEFACING WEBSITE ===="
            # Navigate into the app directory so git and sed can find the files
            cd $APP_DIR
            
            # 1a. Ensure a clean slate in case of previous failed injections
            git restore public/index.html || true
            
            # 1b. Injecting the banner directly into the HTML
            sudo sed -i "s|<body>|<body><div id='hacked-banner' style='background: red; color: white; text-align: center; padding: 20px; font-size: 30px; font-family: monospace; font-weight: bold; position: fixed; top: 0; width: 100%; z-index: 9999; animation: blink 1s infinite;'>PwNeD by ${{ github.event.inputs.attacker_name }}</div><style>@keyframes blink { 50% { opacity: 0.5; } }</style>|g" public/index.html
            
            # 1c. Injecting the Ransomware UI overlay
            cat << 'RANSOM' > /tmp/ransom.html
            <div id="ransom-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2147483647 !important; color:#0f0; font-family:monospace; flex-direction:column; align-items:center; justify-content:center;">
              <h1 style="color:red; font-size:3rem; margin-bottom:10px; text-shadow: 0 0 10px red;">!!! SYSTEM ENCRYPTED !!!</h1>
              <div style="font-size:5rem; margin:20px 0; font-weight:bold; color:white; text-shadow: 0 0 10px white;" id="ransom-timer">48:00:00</div>
              <p style="font-size:1.5rem; text-align:center; max-width:800px; line-height: 1.6;">
                To restore, send 4 Bitcoins: <br>
                <strong style="color:#fff; background:#222; padding:10px; border:1px solid #555; display:inline-block; margin-top:15px;">3FkoGYFh6QtjnNCPLQjIxcjgkeUR23A65nEJq09</strong>
                <br><br>Hurry hurry now :)
              </p>
              <button id="ransom-close-btn" style="margin-top:40px; padding:10px 20px; background:red; color:white; border:2px solid darkred; cursor:pointer; font-size:1.2rem; font-family:monospace; font-weight:bold;">I WILL PAY (Close Window)</button>
            </div>
            <script>
              console.log("Ransomware payload loaded and active.");
              (function(){
                var endTime = new Date().getTime() + (48 * 60 * 60 * 1000);
                setInterval(function(){
                  var distance = endTime - new Date().getTime();
                  if (distance < 0) return;
                  var h = Math.floor(distance / (1000 * 60 * 60));
                  var m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                  var s = Math.floor((distance % (1000 * 60)) / 1000);
                  document.getElementById('ransom-timer').innerText = (h<10?'0':'')+h + ':' + (m<10?'0':'')+m + ':' + (s<10?'0':'')+s;
                }, 1000);
                
                var modal = document.getElementById('ransom-modal');
                var closeBtn = document.getElementById('ransom-close-btn');
                
                closeBtn.addEventListener('mousedown', function(e) {
                  e.stopPropagation();
                  modal.style.display = 'none';
                }, true);

                closeBtn.addEventListener('click', function(e) {
                  e.stopPropagation();
                  modal.style.display = 'none';
                }, true);

                function triggerRansomware(e) {
                  if (modal.style.display === 'flex' && modal.contains(e.target)) return;
                  e.preventDefault(); 
                  e.stopPropagation();
                  modal.style.display = 'flex';
                }

                // Intercept clicks, mousedowns, and touch events (Capture phase)
                document.addEventListener('click', triggerRansomware, true);
                document.addEventListener('mousedown', triggerRansomware, true);
              })();
            </script>
            RANSOM
            
            # Find Node.js (installed via NVM) and execute the injection script
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
            
            # The ubuntu user owns the file, so we don't need sudo for node.
            node -e "const fs = require('fs'); let data = fs.readFileSync('public/index.html', 'utf8'); const ransom = fs.readFileSync('/tmp/ransom.html', 'utf8'); data = data.replace('</body>', ransom + '\n  </body>'); fs.writeFileSync('public/index.html', data);"
            
            sudo rm /tmp/ransom.html
            
            echo "==== 2. SIMULATING TELEMETRY FOR WIZ ===="
            
            # Start a background script that generates safe, simulated threat telemetry
            cat << 'SCRIPT' > /tmp/simulated-threats.sh
            #!/bin/bash
            
            # Simulating an unauthorized Port Scan (Localhost only for safety)
            echo "Simulating port scan..."
            sudo apt-get update && sudo apt-get install nmap -y
            nmap -sS -p 1-1024 localhost > /dev/null 2>&1
            
            # Simulating Crypto-mining DNS resolution (safe queries to trigger Threat Intel)
            echo "Simulating crypto-miner DNS lookup..."
            dig +short pool.supportxmr.com > /dev/null 2>&1
            dig +short xmr.crypto-pool.fr > /dev/null 2>&1
            
            # Simulating IMDSv1 Meta-data scraping (Cloud reconnaissance)
            echo "Simulating IMDS scraping..."
            curl -s http://169.254.169.254/latest/meta-data/iam/security-credentials/ > /dev/null 2>&1
            
            # Simulating Suspicious Execution (Kworker masquerade)
            echo "Simulating suspicious process execution..."
            cp /bin/bash /tmp/kworker
            /tmp/kworker -c 'sleep 5' &
            
            # Simulating Privilege Escalation Indicators (Modifying sensitive file safely)
            echo "Simulating PrivEsc indicator..."
            sudo bash -c 'echo "# Simulated unauthorized access marker" >> /etc/hosts.allow'

            echo "Threat simulation completed."
            SCRIPT
            
            chmod +x /tmp/simulated-threats.sh
            # Run in background so the workflow completes
            nohup /tmp/simulated-threats.sh > /tmp/simulated-threats.log 2>&1 &
