name: 💥 Force Destroy All Resources (Cleanup)

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region to clean up"
        required: true
        default: "ap-southeast-2"
      confirm_destroy:
        description: "Type 'DESTROY' to confirm"
        required: true

jobs:
  force-cleanup:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm_destroy == 'DESTROY'
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Force Cleanup AWS Resources via CLI
        run: |
          set +e # Don't exit on error, try to delete as much as possible
          
          echo "==== 1. TERMINATING EC2 INSTANCES ===="
          INSTANCE_IDS=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=mock-gov-portal-instance" "Name=instance-state-name,Values=running,stopped,pending,stopping" --query "Reservations[].Instances[].InstanceId" --output text)
          if [ -n "$INSTANCE_IDS" ]; then
            echo "Terminating instances: $INSTANCE_IDS"
            aws ec2 terminate-instances --instance-ids $INSTANCE_IDS
            echo "Waiting for instances to fully terminate (required before VPC deletion)..."
            aws ec2 wait instance-terminated --instance-ids $INSTANCE_IDS
          else
            echo "No matching instances found."
          fi

          echo "==== 2. DELETING KEY PAIRS ===="
          KEY_NAMES=$(aws ec2 describe-key-pairs --filters "Name=key-name,Values=mock-gov-portal-key-*" --query "KeyPairs[].KeyName" --output text)
          for key in $KEY_NAMES; do
            echo "Deleting Key Pair: $key"
            aws ec2 delete-key-pair --key-name "$key"
          done

          echo "==== 3. DELETING VPCs & NETWORKING ===="
          VPC_IDS=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=mock-gov-portal-vpc" --query "Vpcs[].VpcId" --output text)
          for vpc in $VPC_IDS; do
            echo "Cleaning up VPC: $vpc"
            
            # Detach and delete Internet Gateways
            IGW_IDS=$(aws ec2 describe-internet-gateways --filters "Name=attachment.vpc-id,Values=$vpc" --query "InternetGateways[].InternetGatewayId" --output text)
            for igw in $IGW_IDS; do
              echo "  Detaching and deleting IGW: $igw"
              aws ec2 detach-internet-gateway --internet-gateway-id "$igw" --vpc-id "$vpc"
              aws ec2 delete-internet-gateway --internet-gateway-id "$igw"
            done

            # Delete Subnets
            SUBNET_IDS=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$vpc" --query "Subnets[].SubnetId" --output text)
            for subnet in $SUBNET_IDS; do
              echo "  Deleting Subnet: $subnet"
              aws ec2 delete-subnet --subnet-id "$subnet"
            done

            # Delete Security Groups (excluding default)
            SG_IDS=$(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=$vpc" "Name=group-name,Values=mock-gov-portal-sg" --query "SecurityGroups[].GroupId" --output text)
            for sg in $SG_IDS; do
              echo "  Deleting Security Group: $sg"
              aws ec2 delete-security-group --group-id "$sg"
            done

            # Delete Route Tables (custom only)
            RT_IDS=$(aws ec2 describe-route-tables --filters "Name=vpc-id,Values=$vpc" --query "RouteTables[?Associations[0].Main != \`true\`].RouteTableId" --output text)
            for rt in $RT_IDS; do
              echo "  Deleting Route Table: $rt"
              aws ec2 delete-route-table --route-table-id "$rt"
            done

            # Finally, delete the VPC
            echo "  Deleting VPC: $vpc"
            aws ec2 delete-vpc --vpc-id "$vpc"
          done
          
          echo "==== 4. DELETING S3 BUCKETS ===="
          BUCKETS=$(aws s3api list-buckets --query "Buckets[?starts_with(Name, 'aus-gov-internal-backup-')].Name" --output text)
          for bucket in $BUCKETS; do
            echo "Emptying and deleting bucket: $bucket"
            aws s3 rm "s3://$bucket" --recursive
            aws s3api delete-bucket --bucket "$bucket"
          done

          echo "==== 5. DELETING IAM ROLES ===="
          ROLES=$(aws iam list-roles --query "Roles[?starts_with(RoleName, 'WizAccessRole-')].RoleName" --output text)
          for role in $ROLES; do
            echo "Cleaning up IAM Role: $role"
            # Detach managed policies
            POLICIES=$(aws iam list-attached-role-policies --role-name "$role" --query "AttachedPolicies[].PolicyArn" --output text)
            for pol in $POLICIES; do
              aws iam detach-role-policy --role-name "$role" --policy-arn "$pol"
            done
            # Delete inline policies
            INLINE=$(aws iam list-role-policies --role-name "$role" --query "PolicyNames" --output text)
            for inl in $INLINE; do
              aws iam delete-role-policy --role-name "$role" --policy-name "$inl"
            done
            # Delete the role
            aws iam delete-role --role-name "$role"
          done

          echo "Cleanup complete!"
